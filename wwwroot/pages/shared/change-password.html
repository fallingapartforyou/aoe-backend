<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Change Password</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/profile.css"> <!-- reuse -->

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script>
Guard.requireLogin();
</script>

<script defer src="../../assets/js/modules/shared/change-password.js"></script>

</head>

<body>

<div id="layout"></div>

<div class="profile-container">

    <div class="profile-card">

        <div class="profile-header">
            <h3>Change Password</h3>
            <button class="btn-back" onclick="history.back()">Back</button>
        </div>

        <form id="changePasswordForm" class="profile-form">

            <div class="form-group">
                <label>Old Password</label>
                <input type="password" id="oldPassword" class="form-input">
            </div>

            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" class="form-input">
            </div>

            <div class="profile-actions">
                <button type="button" id="changeBtn" class="btn-primary" onclick="changePassword()">
                    Change Password
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
