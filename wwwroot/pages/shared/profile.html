<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Profile</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer src="../../assets/js/modules/shared/profile.js"></script>

<script>
Guard.requireLogin();
</script>

</head>

<body>

<div id="layout"></div>

<div class="content">
<div class="container">

    <!-- HEADER -->
    <div class="page-header">
        <div>
            <h2>User Profile</h2>
            <p class="text-muted">Manage your account</p>
        </div>

        <button class="btn-back" onclick="history.back()">← Back</button>
    </div>

    <!-- PROFILE CARD -->
    <div class="profile-card">

        <!-- LEFT -->
        <div class="profile-left">
            <div class="avatar" id="avatar">U</div>
            <h3 id="displayName">User</h3>
            <span id="roleBadge" class="role-badge">student</span>
        </div>

        <!-- RIGHT -->
        <div class="profile-right">

            <div id="loadingState" class="loading-box">
                Loading profile...
            </div>

            <form id="profileForm" style="display:none">

                <div class="form-group">
                    <label>Name</label>
                    <input id="name" class="form-input">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input id="email" class="form-input" disabled>
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input id="phone" class="form-input">
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <input id="role" class="form-input" disabled>
                </div>

                <div class="header-actions">
                    <button type="button"
                            id="updateBtn"
                            class="btn-primary"
                            onclick="updateProfile()">
                        Update Profile
                    </button>

                    <button type="button"
                            class="btn-secondary"
                            onclick="goChangePassword()">
                        Change Password
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>
</div>

</body>
</html>
