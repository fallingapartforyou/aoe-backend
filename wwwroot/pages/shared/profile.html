<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Profile</title>

<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<link rel="stylesheet"
href="../../assets/css/layout/sidebar.css">

<link rel="stylesheet"
href="../../assets/css/layout/layout.css">

<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/card.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/pages/shared/profile.css">

<link rel="stylesheet"
href="../../assets/css/components/notification.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer
src="../../assets/js/modules/shared/profile.js">
</script>

<script defer
src="../../assets/js/modules/shared/change-password.js">
</script>

<script>
Guard.requireLogin();
</script>

</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>

                Account Settings

            </h1>

            <p>

                Manage profile information
                and account security

            </p>

        </div>

    </div>

    <!-- PROFILE GRID -->

    <div class="profile-layout">

        <!-- LEFT SIDEBAR -->

        <div class="profile-sidebar card">

    <div
        class="profile-avatar"
        id="avatar">

        U

    </div>

    <h3 id="displayName">

        User

    </h3>

    <span
        id="roleBadge"
        class="role-badge">

        Student

    </span>

</div>

        <!-- RIGHT CONTENT -->

        <div class="profile-content">

            <!-- PROFILE INFO -->

            <div class="card">

                <div class="section-header">

                    <h3>

                        Personal Information

                    </h3>

                </div>

                <form id="profileForm">

                    <div class="form-grid">

                        <div>

                            <label>

                                Full Name

                            </label>

                            <input
                                id="name"
                                class="form-input">

                        </div>

                        <div>

                            <label>

                                Email

                            </label>

                            <input
                                id="email"
                                disabled
                                class="form-input">

                        </div>

                        <div>

                            <label>

                                Phone

                            </label>

                            <input
                                id="phone"
                                class="form-input">

                        </div>

                        <div>

                            <label>

                                Role

                            </label>

                            <input
                                id="role"
                                disabled
                                class="form-input">

                        </div>

                    </div>

                    <div class="form-actions">

                        <button
                            type="button"
                            class="btn-primary"
                            id="updateBtn"
                            onclick="updateProfile()">

                            Save Changes

                        </button>

                    </div>

                </form>

            </div>

            <!-- SECURITY -->

            <div class="card security-card">

                <div class="section-header">

                    <h3>

                        Security

                    </h3>

                </div>

                <div class="password-grid">

                    <div>

                        <label>

                            Current Password

                        </label>

                        <input
                            type="password"
                            id="oldPassword"
                            class="form-input">

                    </div>

                    <div>

                        <label>

                            New Password

                        </label>

                        <input
                            type="password"
                            id="newPassword"
                            class="form-input">

                    </div>

                </div>

                <div class="form-actions">

                    <button
                        type="button"
                        id="changeBtn"
                        class="btn-secondary"
                        onclick="changePassword()">

                        Change Password

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

</main>

</body>

</html>
