<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Profile</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
rel="stylesheet">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script>

Guard.requireLogin();

</script>

<script defer
src="../../assets/js/modules/shared/profile.js">
</script>

</head>

<body>

<div class="container mt-4 d-flex justify-content-center">

<div class="card shadow-sm p-4"
style="max-width:600px">

<div
class="d-flex justify-content-between align-items-center mb-3">

<h3>User Profile</h3>

<button
class="btn btn-outline-secondary btn-sm"
onclick="history.back()">

Back

</button>

</div>

<div id="loadingState">

Loading profile...

</div>

<form id="profileForm"
style="display:none">

<div class="mb-3">

<label class="form-label">

Name

</label>

<input
id="name"
class="form-control">

</div>


<div class="mb-3">

<label class="form-label">

Email

</label>

<input
id="email"
class="form-control"
disabled>

</div>


<div class="mb-3">

<label class="form-label">

Phone

</label>

<input
id="phone"
class="form-control">

</div>


<div class="mb-3">

<label class="form-label">

Role

</label>

<input
id="role"
class="form-control"
disabled>

</div>


<div
class="d-flex gap-2">

<button
type="button"
id="updateBtn"
class="btn btn-primary"
onclick="updateProfile()">

Update Profile

</button>


<button
type="button"
class="btn btn-outline-secondary"
onclick="goChangePassword()">

Change Password

</button>

</div>

</form>

</div>

</div>

</body>

</html>
