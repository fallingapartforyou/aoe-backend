<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Class Management</title>

<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<link rel="stylesheet"
href="../../assets/css/layout/sidebar.css">

<link rel="stylesheet"
href="../../assets/css/layout/layout.css">

<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/card.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/components/skeleton.css">

<link rel="stylesheet"
href="../../assets/css/pages/teacher/class.css">

<link rel="stylesheet"
href="../../assets/css/shared/notification.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>
<script src="../../assets/js/modules/shared/notification.js"></script>
<script defer
src="../../assets/js/modules/teacher/classes.js">
</script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>Class Management</h1>

            <p>
                Create, manage and monitor your classes
            </p>

        </div>

        <div class="header-actions">

            <button
                class="btn-secondary"
                onclick="history.back()">

                Back

            </button>

        </div>

    </div>

    <!-- SEARCH + CREATE -->

    <div class="management-row">

        <div class="card management-card">

            <h3>
                Search Class
            </h3>

            <div class="search-box">

                <input
                    id="keyword"
                    class="form-input"
                    placeholder="Search by class name">

                <button
                    class="btn-primary"
                    onclick="loadClasses()">

                    Search

                </button>

            </div>

        </div>

        <div class="card management-card">

            <h3>
                Create New Class
            </h3>

            <div class="create-box">

                <input
                    id="className"
                    class="form-input"
                    placeholder="Enter class name">

                <button
                    class="btn-primary"
                    onclick="createClass()">

                    Create

                </button>

            </div>

        </div>

    </div>

    <!-- FILTER BAR -->

    <div class="card filter-card">

        <div class="filter-left">

            <span>
                Class List
            </span>

        </div>

    </div>

    <!-- CLASS LIST -->

    <div
        id="classList"
        class="class-grid">

    </div>

</div>

</main>

</body>

</html>
