<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Question Bank</title>

<link rel="stylesheet" href="../../assets/css/core/variables.css">
<link rel="stylesheet" href="../../assets/css/core/base.css">
<link rel="stylesheet" href="../../assets/css/core/animation.css">

<link rel="stylesheet" href="../../assets/css/layout/sidebar.css">
<link rel="stylesheet" href="../../assets/css/layout/layout.css">

<link rel="stylesheet" href="../../assets/css/components/button.css">
<link rel="stylesheet" href="../../assets/css/components/card.css">
<link rel="stylesheet" href="../../assets/css/components/form.css">
<link rel="stylesheet" href="../../assets/css/components/modal.css">
<link rel="stylesheet" href="../../assets/css/components/table.css">

<link rel="stylesheet" href="../../assets/css/pages/teacher/question.css">

<link rel="stylesheet"
href="../../assets/css/shared/notification.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/logout.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>
<script src="../../assets/js/modules/shared/notification.js"></script>
<script defer src="../../assets/js/modules/teacher/questions.js"></script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>Question Bank</h1>

            <p>
                Manage questions and generate new content
            </p>

        </div>

        <div class="header-actions">

            <button
                class="btn-secondary"
                onclick="history.back()">

                Back

            </button>

            <button
                class="btn-primary"
                onclick="toggleCreate()">

                + Create Question

            </button>

            <button
               class="btn-primary"
               onclick="openAIModal()">

                 AI Generate

            </button>

            <button
                class="btn-primary"
                onclick="toggleAssign()">

                Assign Class

            </button>

        </div>

    </div>

    <!-- INFO -->

    <div class="info-banner">

        <span id="assignmentTypeLabel"></span>

        <span id="questionCounter"></span>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

        <div class="stat-card">

            <span>Total Questions</span>

            <h2 id="totalQuestions">
                0
            </h2>

        </div>

        <div class="stat-card">

            <span>Multiple Choice</span>

            <h2 id="totalChoice">
                0
            </h2>

        </div>

        <div class="stat-card">

            <span>Fill Blank</span>

            <h2 id="totalFill">
                0
            </h2>

        </div>

    </div>

    <!-- AI PREVIEW -->

    <div
        id="aiPreviewBox"
        class="card"
        style="display:none;">

        <div class="card-header">

            <h3>
                AI Preview
            </h3>

        </div>

        <div id="aiPreviewList"></div>

        <div class="card-actions">

            <button
                onclick="saveAIQuestions()">

                Save Selected

            </button>

            <button
                class="btn-secondary"
                onclick="clearAIPreview()">

                Cancel

            </button>

        </div>

    </div>

    <div class="card toolbar-card">

    <input
        id="questionSearch"
        class="form-input"
        placeholder="Search question..."
        onchange="applyFilters()">

    <select
        id="questionSort"
        onchange="applyFilters()">

        <option value="newest">
            Newest
        </option>

        <option value="oldest">
            Oldest
        </option>

        <option value="az">
            A → Z
        </option>

        <option value="za">
            Z → A
        </option>

    </select>

</div>

<!-- QUESTION TABLE -->

<div class="card">

    <div class="card-header">

        <h3>
            Question List
        </h3>

        <input
            id="searchQuestion"
            class="form-input"
            placeholder="Search question..."
            oninput="applyFilters()">

    </div>

        <div class="table-container">

            <table class="table">

                <thead>

                    <tr>

                        <th>#</th>

                        <th>
                            Question
                        </th>

                        <th>
                            Answer
                        </th>

                        <th>
                            Score
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="questionList">

                </tbody>

            </table>

        </div>

    </div>

</div>

</main>

<!-- QUESTION MODAL -->

<div
class="modal"
id="editModal">

<div class="modal-content modal-lg">

    <div class="modal-header">

        <h3 id="modalTitle">

            Create Question

        </h3>

        <button onclick="closeEdit()">

            ✕

        </button>

    </div>

    <input
        id="content"
        placeholder="Question content">

    <!-- SINGLE CHOICE -->

    <div
        id="optionsBox"
        class="form-grid">

        <input id="A" placeholder="Option A">
        <input id="B" placeholder="Option B">
        <input id="C" placeholder="Option C">
        <input id="D" placeholder="Option D">

        <select id="correctAnswer">

            <option value="">
                Select Correct Answer
            </option>

            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>

        </select>

    </div>

    <!-- FILL BLANK -->

    <div
        id="fillAnswerBox"
        style="display:none;">

        <input
            id="fillCorrectAnswer"
            placeholder="Correct answer">

    </div>

    <input
        id="explanation"
        placeholder="Explanation">

    <div class="modal-actions">

        <button
            id="createBtn"
            onclick="createQuestion()">

            Save

        </button>

        <button
            onclick="closeEdit()">

            Cancel

        </button>

    </div>

</div>

</div>

<div
class="modal"
id="assignModal">

<div class="modal-content modal-lg">

    <div class="modal-header">

        <h3>
            Assign To Classes
        </h3>

        <button
            onclick="closeAssignModal()">

            ✕

        </button>

    </div>

    <div
        id="classList">

    </div>

</div>
</div>

<div
class="modal"
id="aiModal">

    <div class="modal-content modal-lg">

        <div class="modal-header">

            <h3>
                AI Question Generator
            </h3>

            <button
                onclick="closeAIModal()">

                ✕

            </button>

        </div>

        <div class="form-grid">

            <input
                id="aiTopic"
                placeholder="Topic">

            <select id="aiDifficulty">

                <option value="easy">
                    Easy
                </option>

                <option value="medium">
                    Medium
                </option>

                <option value="hard">
                    Hard
                </option>

            </select>

            <input
                id="aiCount"
                type="number"
                value="3"
                min="1"
                max="20">

        </div>

        <div class="modal-actions">

            <button
                class="btn-primary"
                onclick="generateAIQuestions()">

                Generate

            </button>

            <button
                onclick="closeAIModal()">

                Cancel

            </button>

        </div>

    </div>

</div>

</div>

</body>
</html>
