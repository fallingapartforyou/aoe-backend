<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Questions</title>

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/sidebar.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer src="../../assets/js/modules/teacher/questions.js"></script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>

</head>

<body>

<div id="layout"></div>

<div class="main-content">

    <!-- HEADER -->
    <div class="page-header">
        <div>
            <h2>Questions</h2>
            <p class="text-muted">Create and manage questions</p>
        </div>

        <div class="header-actions">
            <button class="btn-back" onclick="history.back()">← Back</button>
            <button class="btn-primary" onclick="toggleCreate()">+ Create</button>
            <button class="btn-secondary" onclick="toggleAssign()">Assign</button>
        </div>
    </div>

    <!-- CREATE -->
    <div id="createBox" class="card form-card">

    <h4>Create Question</h4>
    <p id="assignmentTypeLabel" class="text-muted"></p>

    <!-- QUESTION -->
    <div class="form-group">
        <label>Question</label>
        <input id="content" class="form-input">
    </div>

    <!-- SINGLE CHOICE -->
    <div id="optionsBox" class="form-group" style="display:none">
        <label>Options</label>

        <input id="A" class="form-input" placeholder="Option A">
        <input id="B" class="form-input" placeholder="Option B">
        <input id="C" class="form-input" placeholder="Option C">
        <input id="D" class="form-input" placeholder="Option D">

        <label>Correct Answer</label>
        <select id="correctAnswer" class="form-input">
            <option value="">-- Select --</option>
            <option>A</option>
            <option>B</option>
            <option>C</option>
            <option>D</option>
        </select>
    </div>

    <!-- FILL BLANK -->
    <div id="fillAnswerBox" class="form-group" style="display:none">
        <label>Correct Answer</label>
        <input id="fillCorrectAnswer" class="form-input">
    </div>

    <!-- EXPLANATION -->
    <div class="form-group">
        <label>Explanation</label>
        <input id="explanation" class="form-input">
    </div>

    <button class="btn-primary" onclick="createQuestion()">Create</button>

</div>

    <!-- ASSIGN -->
    <div id="assignBox" class="card" style="display:none;">
        <h4>Assign to class</h4>
        <div id="classList"></div>
    </div>

    <!-- LIST -->
    <div id="questionList" class="question-list"></div>

</div>

</body>
</html>
