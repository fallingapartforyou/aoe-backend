<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Skill Submissions
    </title>

    <link rel="stylesheet"
          href="../../assets/css/core/variables.css">
    
    <link rel="stylesheet"
          href="../../assets/css/core/base.css"> 

    <link rel="stylesheet"
          href="../../assets/css/components/button.css">

    <link rel="stylesheet"
          href="../../assets/css/components/card.css">

    <link rel="stylesheet"
          href="../../assets/css/components/form.css">

    <link rel="stylesheet"
          href="../../assets/css/components/modal.css">

    <link rel="stylesheet"
          href="../../assets/css/components/table.css">

    <link rel="stylesheet"
          href="../../assets/css/layout/sidebar.css">

    <link rel="stylesheet"
          href="../../assets/css/layout/topbar.css">

    <link rel="stylesheet"
          href="../../assets/css/pages/teacher/skill-submissions.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <div id="layout"></div>

    <main class="page-content">

        <section class="skills-header">

            <div>

                <h1>
                    Submissions
                </h1>

                <p>
                    Upload and manage student writing
                </p>

            </div>

            <button
                id="openUploadBtn"
                class="btn btn-primary">

                <i class="bi bi-upload"></i>

                Upload Submission

            </button>

        </section>

        <section class="card">

            <table class="table">

                <thead>

                    <tr>

                        <th>
                            Student
                        </th>

                        <th>
                            File
                        </th>

                        <th>
                            Words
                        </th>

                        <th>
                            Date
                        </th>

                        <th>
                            Actions
                        </th>

                    </tr>

                </thead>

                <tbody id="submissionTable">

                </tbody>

            </table>

        </section>

    </main>

    <!-- UPLOAD MODAL -->

    <div
        id="uploadModal"
        class="modal hidden">

        <div class="modal-content">

            <div class="modal-header">

                <h3>
                    Upload Submission
                </h3>

                <button
                    id="closeUploadBtn">

                    ×

                </button>

            </div>

            <div class="modal-body">

                <div class="form-group">

                    <label>
                        Student Name
                    </label>

                    <input
                        id="studentName"
                        type="text">

                </div>

                <div class="form-group">

                    <label>
                        Upload File
                    </label>

                    <input
                        id="submissionFile"
                        type="file">

                </div>

                <div class="form-group">

                    <label>
                        Or Paste Text
                    </label>

                    <textarea
                        id="rawText"
                        rows="10"></textarea>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    id="uploadBtn"
                    class="btn btn-primary">

                    Upload

                </button>

            </div>

        </div>

    </div>

    <script src="../../assets/js/core/config.js"></script>

    <script src="../../assets/js/core/storage.js"></script>

    <script src="../../assets/js/core/router.js"></script>

    <script src="../../assets/js/layout/sidebar.js"></script>

    <script src="../../assets/js/layout/layout.js"></script>

    <script src="../../assets/js/modules/teacher/skill-submissions.js"></script>

</body>

</html>
