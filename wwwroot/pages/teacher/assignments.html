<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Assignments</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>
<script src="../../assets/js/modules/utils/validator.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer src="../../assets/js/modules/teacher/assignments.js"></script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>

</head>

<body>

<div id="layout"></div>

<div class="content">
<div class="container">

    <!-- 🔷 TOPBAR -->
    <div class="topbar">
        <div class="topbar-title">Assignments</div>

        <div class="topbar-actions">
            <button onclick="history.back()">Back</button>
            <button onclick="openCreateModal()">+ Create</button>
        </div>
    </div>

    <!-- 🔍 SEARCH -->
    <div class="card" style="margin-bottom:20px;">
        <input id="keyword" placeholder="Search assignment">
        <button onclick="loadAssignments()">Search</button>
    </div>

    <!-- 📊 TABLE -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Questions</th>
                    <th>Type</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="assignmentList"></tbody>
        </table>
    </div>    

</div>
</div>

<!-- ===== MODAL CREATE ===== -->
<div class="modal" id="createModal">
    <div class="modal-box">

        <h3>Create Assignment</h3>

        <input id="assignmentName" placeholder="Assignment name">

        <select id="questionType">
            <option value="single_choice">Single choice</option>
            <option value="fill_blank">Fill blank</option>
        </select>

        <input id="questionCount" type="number" placeholder="Question count">

        <input id="openTime" type="datetime-local">
        <input id="closeTime" type="datetime-local">

        <label><input type="checkbox" id="showResult"> Show result</label>
        <label><input type="checkbox" id="showExplanation"> Show explanation</label>

        <div class="modal-actions">
            <button onclick="createAssignment()">Create</button>
            <button onclick="closeModal()">Cancel</button>
        </div>

    </div>
</div>

</body>
</html>
