<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Assignment Results</title>

<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<link rel="stylesheet"
href="../../assets/css/layout/sidebar.css">

<link rel="stylesheet"
href="../../assets/css/layout/layout.css">

<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/card.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/components/table.css">

<link rel="stylesheet"
href="../../assets/css/pages/teacher/result.css">

<link rel="stylesheet"
href="../../assets/css/shared/notification.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/logout.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>
<script src="../../assets/js/modules/shared/notification.js"></script>
<script defer
src="../../assets/js/modules/teacher/results.js">
</script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <!-- HEADER -->

    <div class="page-header">

        <div>

            <h1>
                Assignment Results
            </h1>

            <p>

                Monitor submissions,
                scores and activity

            </p>

        </div>

        <div class="header-actions">

            <button
                class="btn-secondary"
                onclick="backExam()">

                Back

            </button>

            <button
                class="btn-primary"
                onclick="exportCSV()">

                Export CSV

            </button>

        </div>

    </div>

    <!-- STATS -->

<div class="stats-grid">

    <div class="stat-card">

        <span>
            Total Submissions
        </span>

        <h2 id="totalStudents">
            0
        </h2>

    </div>

    <div class="stat-card">

        <span>
            Submitted
        </span>

        <h2 id="submittedCount">
            0
        </h2>

    </div>

    <div class="stat-card">

        <span>
            Average Score
        </span>

        <h2 id="averageScore">
            0
        </h2>

    </div>

    <div class="stat-card">

        <span>
            Highest Score
        </span>

        <h2 id="highestScore">
            0
        </h2>

    </div>

</div>

    <!-- FILTER -->
<div class="card toolbar-card">

    <input
        id="search"
        class="form-input"
        placeholder="Search student..."
        oninput="filterResults()">

    <select
        id="sortScore"
        onchange="filterResults()">

        <option value="">
            Sort Score
        </option>

        <option value="score-desc">
            Highest First
        </option>

        <option value="score-asc">
            Lowest First
        </option>

    </select>

    <select
        id="sortDate"
        onchange="filterResults()">

        <option value="">
            Sort Date
        </option>

        <option value="date-desc">
            Newest First
        </option>

        <option value="date-asc">
            Oldest First
        </option>

    </select>

</div>
    <!-- RESULT TABLE -->

    <div class="card">

        <div class="card-header">

            <h3>

                Student Results

            </h3>

        </div>

        <div class="table-container">

            <table class="table">

                <thead>

                    <tr>

                        <th>
                            Student
                        </th>

                        <th>
                            Email
                        </th>

                        <th>
                            Score
                        </th>

                        <th>
                            Time
                        </th>

                        <th>
                            Submitted
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="resultList">

                </tbody>

            </table>

        </div>

    </div>

</div>

</main>

</body>

</html>
