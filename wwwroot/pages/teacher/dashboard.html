<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script src="../../assets/js/core/logout.js"></script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>

<script defer src="../../assets/js/modules/teacher/dashboard.js"></script>
</head>

<body>

<div id="layout"></div>

<div class="content">
<div class="container">

    <!-- 🔷 TOP BAR -->
    <div class="topbar">
        <div class="topbar-title">Màn hình chính</div>

        <div class="topbar-actions">
            <button>🔔</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- 🔥 DASHBOARD MENU (MAIN UI) -->
    <div class="dashboard-grid">

        <div class="dashboard-card" onclick="Router.goTeacherClasses()">
            <div class="icon">📚</div>
            <span>Lớp học</span>
        </div>

        <div class="dashboard-card" onclick="Router.goAssignments()">
            <div class="icon">📄</div>
            <span>Bài tập</span>
        </div>

        <div class="dashboard-card" onclick="Router.goStudents()">
            <div class="icon">👨‍🎓</div>
            <span>Học sinh</span>
        </div>

        <div class="dashboard-card">
            <div class="icon">📊</div>
            <span>Kết quả</span>
        </div>

    </div>

    <!-- 🔢 STATS -->
    <div class="stats-grid">

        <div class="card">
            <p>Total Classes</p>
            <h2 id="totalClasses">0</h2>
        </div>

        <div class="card">
            <p>Assignments</p>
            <h2 id="totalAssignments">0</h2>
        </div>

        <div class="card">
            <p>Students</p>
            <h2 id="totalStudents">0</h2>
        </div>

        <div class="card">
            <p>Submissions</p>
            <h2 id="totalSubmissions">0</h2>
        </div>

    </div>

    <!-- 🔔 NOTIFICATIONS -->
    <div class="card" style="margin-top:20px;">
        <h4>Recent Activity</h4>
        <div id="notifications"></div>
    </div>

</div>
</div>

</body>
</html>
