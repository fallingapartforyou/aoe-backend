<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Skill Review
    </title>

    <link rel="stylesheet"
          href="../../assets/css/core/variables.css">

    <link rel="stylesheet"
          href="../../assets/css/core/base.css">      

    <link rel="stylesheet"
          href="../../assets/css/components/button.css">

    <link rel="stylesheet"
          href="../../assets/css/components/card.css">

    <link rel="stylesheet"
          href="../../assets/css/components/form.css">

    <link rel="stylesheet"
          href="../../assets/css/components/modal.css">

    <link rel="stylesheet"
          href="../../assets/css/pages/teacher/skill-review.css">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

</head>

<body>

    <main class="review-layout">

        <!-- HEADER -->

        <section class="review-header">

            <div>

                <h1>
                    Writing Review
                </h1>

                <p id="studentInfo">
                    Loading...
                </p>

            </div>

            <div class="review-actions">

                <button
                    id="exportPdfBtn"
                    class="btn btn-primary">

                    <i class="bi bi-file-earmark-pdf"></i>

                    PDF

                </button>

                <button
                    id="exportDocxBtn"
                    class="btn btn-secondary">

                    <i class="bi bi-file-earmark-word"></i>

                    DOCX

                </button>

            </div>

        </section>

        <!-- CONTENT -->

        <section class="review-grid">

            <!-- LEFT -->

            <div class="review-text-panel">

                <div class="card">

                    <h3>
                        Original Writing
                    </h3>

                    <div class="editor-toolbar">

    <button id="boldBtn">

        <i class="bi bi-type-bold"></i>

    </button>

    <button id="italicBtn">

        <i class="bi bi-type-italic"></i>

    </button>

    <button id="underlineBtn">

        <i class="bi bi-type-underline"></i>

    </button>

    <div class="toolbar-divider"></div>

    <button id="commentBtn">

        <i class="bi bi-chat-left-text"></i>

    </button>

    <button id="trackBtn">

        <i class="bi bi-pencil-square"></i>

    </button>

    <div class="toolbar-divider"></div>

    <span id="wordCounter">

        0 words

    </span>

</div>
                    <div
                        id="writingContent"
                        class="writing-content">

                    </div>

                </div>

            </div>

            <!-- RIGHT -->

            <div class="review-side-panel">

                <!-- LEVEL -->

                <div class="card">

    <h3>
        Overview
    </h3>

    <div class="overview-grid">

        <div>

            <span>
                Topic
            </span>

            <strong
                id="mainTopic">

            </strong>

        </div>

        <div>

            <span>
                CEFR
            </span>

            <strong
                id="level">

            </strong>

        </div>

        <div>

            <span>
                Expected
            </span>

            <strong
                id="expectedLevel">

            </strong>

        </div>

        <div>

            <span>
                Task Match
            </span>

            <strong
                id="taskRelevance">

            </strong>

        </div>

    </div>

</div>

                <!-- SUMMARY -->

                <div class="card">

                    <h3>
                        AI Summary
                    </h3>

                    <p id="summary">

                    </p>

                </div>

                <!-- FEEDBACK -->

                <div class="card">

                    <h3>
                        Grammar
                    </h3>

                    <p id="grammar">

                    </p>

                </div>

                <div class="card">

                    <h3>
                        Vocabulary
                    </h3>

                    <p id="vocabulary">

                    </p>

                </div>

                <div class="card">

                    <h3>
                        Coherence
                    </h3>

                    <p id="coherence">

                    </p>

                </div>

                <div class="card">

                    <h3>
                        Task Completion
                    </h3>

                    <p id="taskCompletion">

                    </p>

                </div>

            </div>

        </section>

        <!-- TEACHER REVIEW -->

        <section class="teacher-review">

            <div class="card">

                <h3>
                    Teacher Evaluation
                </h3>

                <div class="teacher-form">

                    <div>

                        <label>

                            Score

                        </label>

                        <input
                            id="teacherScore"
                            type="number"
                            min="0"
                            max="10"
                            step="0.5">

                    </div>

                    <div>

                        <label>

                            Comment

                        </label>

                        <textarea
                            id="teacherComment"
                            rows="8">

                        </textarea>

                    </div>

                    <button
                        id="saveReviewBtn"
                        class="btn btn-primary">

                        Save Review

                    </button>

                </div>

            </div>

        </section>

    </main>

    <script src="../../assets/js/core/config.js"></script>

    <script src="../../assets/js/core/router.js"></script>

    <script src="../../assets/js/modules/teacher/skill-review.js"></script>

</body>

</html>
