<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Class Students</title>

<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<link rel="stylesheet"
href="../../assets/css/layout/sidebar.css">

<link rel="stylesheet"
href="../../assets/css/layout/layout.css">

<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/card.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/components/table.css">

<link rel="stylesheet"
href="../../assets/css/pages/teacher/class-student.css">

<link rel="stylesheet"
href="../../assets/css/shared/notification.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>
<script src="../../assets/js/modules/shared/notification.js"></script>

<script defer
src="../../assets/js/modules/teacher/students.js">
</script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <div class="page-header">

        <div>

            <h1>
                Students
            </h1>

            <p>
                Manage students enrolled in this class
            </p>

        </div>

        <div class="header-actions">

            <button
                class="btn-secondary"
                onclick="history.back()">

                Back

            </button>

        </div>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <span class="stat-label">
                Total Students
            </span>

            <h2 id="totalStudents">
                0
            </h2>

        </div>

        <div class="stat-card">

            <span class="stat-label">
                Pending Requests
            </span>

            <h2 id="pendingRequests">
                0
            </h2>

        </div>

        <div class="stat-card">

            <span class="stat-label">
                Selected
            </span>

            <h2 id="selectedStudents">
                0
            </h2>

        </div>

    </div>

    <div class="card add-student-card">

        <div class="section-header">

            <h3>
                Invite Student
            </h3>

        </div>

        <div class="add-student-row">

            <input
                id="email"
                class="form-input"
                placeholder="Student email">

            <button
                class="btn-primary"
                onclick="addStudent()">

                Send Invitation

            </button>

        </div>

    </div>

    <div class="card">

        <div class="section-header">

            <h3>
                Pending Join Requests
            </h3>

        </div>

        <div class="table-container">

            <table class="table">

                <thead>

                    <tr>

                        <th>
                            Name
                        </th>

                        <th>
                            Email
                        </th>

                        <th>
                            Type
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="requestList">

                </tbody>

            </table>

        </div>

    </div>

    <div class="card student-table-card">

        <div class="table-toolbar">

            <div>

                <h3>
                    Student List
                </h3>

            </div>

            <div class="toolbar-actions">

                <button
                    class="btn-secondary"
                    onclick="toggleBulkRemove()">

                    Bulk Remove

                </button>

                <button
                    id="bulkBtn"
                    class="btn-primary"
                    onclick="removeSelected()"
                    style="display:none;">

                    Remove Selected

                </button>

            </div>

        </div>

        <div class="table-container">

            <table class="table">

                <thead>

                    <tr>

                        <th
                            id="selectCol"
                            style="display:none;">
                        </th>

                        <th>
                            Name
                        </th>

                        <th>
                            Email
                        </th>

                        <th>
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody id="studentList">

                </tbody>

            </table>

        </div>

    </div>

</div>

</main>

</body>

</html>
