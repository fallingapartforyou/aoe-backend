<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Students</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer src="../../assets/js/modules/teacher/students.js"></script>

<script>
Guard.requireLogin();
Guard.requireTeacher();
</script>

</head>

<body>

<div id="layout"></div>

<div class="content">
<div class="container">

    <!-- 🔷 TOPBAR -->
    <div class="topbar">
        <div class="topbar-title">Students</div>

        <div class="topbar-actions">
            <button onclick="history.back()">Back</button>
        </div>
    </div>

    <!-- ➕ ADD STUDENT -->
    <div class="card" style="margin-bottom: 20px;">
        <input id="email" placeholder="Student email">
        <button onclick="addStudent()">Add student</button>

        <button onclick="toggleBulkRemove()">Bulk Remove</button>
        <button onclick="removeSelected()" id="bulkBtn" style="display:none;">
            Remove Selected
        </button>
    </div>

    <!-- 📊 TABLE -->
    <div class="table-container">
        <table class="table">
            <thead>
                <tr>
                    <th id="selectCol" style="display:none;"></th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="studentList"></tbody>

        </table>
    </div>

</div>
</div>

</body>
</html>
