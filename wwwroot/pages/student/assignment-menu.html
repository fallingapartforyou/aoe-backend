<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Assignment Menu</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer src="../../assets/js/modules/student/menu.js"></script>

<script>
Guard.requireLogin();
Guard.requireStudent();
</script>

</head>

<body>

<div id="layout"></div>

<div class="content">

<!-- HEADER -->
<div class="page-header">
    <div>
        <h2>Assignment</h2>
        <p class="text-muted">Choose what you want to do</p>
    </div>

    <button class="btn-back" onclick="history.back()">
        ← Back
    </button>
</div>

<!-- ACTIONS -->
<div class="menu-grid">

    <div id="startCard" class="menu-card start" onclick="startExam()">
        <h3>Start Exam</h3>
        <p id="startDesc">Loading...</p>
    </div>

    <div id="resultCard" class="menu-card result" onclick="viewResult()">
        <h3>View Result</h3>
        <p id="resultDesc">Loading...</p>
    </div>

    <div id="reviewCard" class="menu-card review" onclick="reviewExam()">
        <h3>Review</h3>
        <p id="reviewDesc">Loading...</p>
    </div>

    <div class="menu-card exit" onclick="history.back()">
        <h3>Exit</h3>
        <p>Go back to assignments</p>
    </div>

</div>

</div>

<!-- START MODAL -->
<div id="startModal" class="modal">
  <div class="modal-box">
    <h3>Start Exam?</h3>
    <p>Timer will start immediately.</p>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="confirmStart()">Start</button>
    </div>
  </div>
</div>

</body>
</html>
