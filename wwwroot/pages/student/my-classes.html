<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>My Classes</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../../assets/css/main.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/sidebar.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>
<script src="../../assets/js/modules/utils/validator.js"></script>
<!-- JS cũ giữ nguyên -->
<script defer src="../../assets/js/modules/student/my-classes.js"></script>

<script>
Guard.requireLogin();
Guard.requireStudent();
</script>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4>Student</h4>

    <button class="sidebar-item" onclick="Router.goStudentDashboard()">Dashboard</button>
    <button class="sidebar-item active">My Classes</button>
    <button class="sidebar-item" onclick="Router.goLogin()">Logout</button>
</div>

<!-- CONTENT -->
<div class="main-content">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Classes</h2>

        <button class="btn btn-outline-secondary btn-sm" onclick="goBack()">
            Back
        </button>
    </div>

    <!-- 🔥 JOIN CLASS (THÊM VÀO) -->
    <div class="card mb-4 p-3">
        <h5 class="mb-3">Join Class</h5>

        <div class="d-flex gap-2">
            <input
                id="classCode"
                class="form-control"
                placeholder="Enter class code"
            />

            <button class="btn btn-primary" onclick="joinClass()">
                Join
            </button>
        </div>
    </div>

    <!-- LIST CLASS -->
    <div id="classList" class="row g-3"></div>

</div>

</body>
</html>
