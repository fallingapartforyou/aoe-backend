<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>My Classes</title>

<link rel="stylesheet" href="../../assets/css/base.css">
<link rel="stylesheet" href="../../assets/css/layout.css">
<link rel="stylesheet" href="../../assets/css/components.css">
<link rel="stylesheet" href="../../assets/css/skeleton.css">
<link rel="stylesheet" href="../../assets/css/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>
<script src="../../assets/js/modules/utils/validator.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script defer src="../../assets/js/modules/student/my-classes.js"></script>

<script>
Guard.requireLogin();
Guard.requireStudent();
</script>

</head>

<body>

<div id="layout"></div>

<div class="content">

<!-- HEADER -->
<div class="page-header">
    <div>
        <h2>My Classes</h2>
        <p>Manage and join your classes</p>
    </div>

    <button class="btn-back" onclick="history.back()">Back</button>
</div>

<!-- JOIN CLASS -->
<div class="card mb-4">
    <h3>Join Class</h3>

    <div class="join-box">
        <input
            id="classCode"
            placeholder="Enter class code"
        />

        <button onclick="joinClass()">
            Join
        </button>
    </div>
</div>

<!-- CLASS LIST -->
<div id="classList" class="class-list"></div>

</div>

</body>
