<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>My Classes</title>

<!-- Core -->
<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<!-- Layout -->
<link rel="stylesheet"
href="../../assets/css/layout/sidebar.css">

<link rel="stylesheet"
href="../../assets/css/layout/layout.css">

<!-- Components -->
<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/card.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/components/badge.css">

<!-- Student -->
<link rel="stylesheet"
href="../../assets/css/pages/student/my-classes.css">

<link rel="stylesheet"
href="../../assets/css/shared/notification.css">

<!-- JS -->
<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>
<script src="../../assets/js/modules/shared/notifications-page.js"></script>
<script src="../../assets/js/modules/utils/validator.js"></script>
<script defer
src="../../assets/js/modules/student/my-classes.js">
</script>

<script>
Guard.requireLogin();
Guard.requireStudent();
</script>
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <!-- PAGE HEADER -->

    <div class="page-header">

        <div>

            <h1>My Classes</h1>

            <p>
                Join classes and manage learning spaces
            </p>

        </div>

    </div>

    <!-- JOIN SECTION -->

    <div class="card join-card">

        <div>

            <h3>
                Join a Class
            </h3>

            <p>
                Enter a class code to send a join request
            </p>

        </div>

        <div class="join-form">

            <input
                id="classCode"
                class="form-input"
                placeholder="Enter class code">

            <button
                class="btn-primary"
                onclick="joinClass()">

                Send Request

            </button>

        </div>

    </div>

    <!-- PENDING REQUESTS -->

    <div class="section-card">

        <div class="section-header">

            <h3>
                Pending Requests
            </h3>

            <span
                class="badge badge-warning">

                Waiting Approval

            </span>

        </div>

        <div
            id="pendingClassList"
            class="class-grid">

            <!-- JS Render -->

        </div>

    </div>

    <!-- MY CLASSES -->

    <div class="section-card">

        <div class="section-header">

            <h3>
                My Classes
            </h3>

            <span
                class="badge badge-success">

                Active

            </span>

        </div>

        <div
            id="classList"
            class="class-grid">

        </div>

    </div>

</div>

</main>

</body>

</html>
