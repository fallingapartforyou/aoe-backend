<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Result</title>

<link rel="stylesheet" href="../../assets/css/core/variables.css">
<link rel="stylesheet" href="../../assets/css/core/base.css">
<link rel="stylesheet" href="../../assets/css/components/button.css">
<link rel="stylesheet" href="../../assets/css/components/card.css">
<link rel="stylesheet" href="../../assets/css/components/table.css">
<link rel="stylesheet" href="../../assets/css/pages/student/result.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>

<script defer src="../../assets/js/modules/student/result.js"></script>
<link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

<div class="result-page">

    <!-- HERO -->
    <div class="result-hero">

        <div>

            <div class="result-badge">Exam Result</div>

            <h1 id="assignmentName">Assignment</h1>

            <p>Your latest submission summary</p>

        </div>

        <button class="btn-secondary" onclick="goMenu()">
            Back
        </button>

    </div>

    <!-- SCORE -->
    <div class="score-panel">

        <div class="score-circle">
            <span id="scoreValue">0</span>
            <small>/100</small>
        </div>

        <div class="score-info">

            <h2 id="scoreStatus">--</h2>
            <p id="scoreMessage">--</p>

        </div>

    </div>

    <!-- LAYOUT -->
    <div class="result-layout">

        <!-- LEFT -->
        <div class="card">

            <div class="card-header">
                <h3>Attempt History</h3>
            </div>

            <table class="table">

                <thead>
                    <tr>
                        <th>Attempt</th>
                        <th>Score</th>
                        <th>Duration</th>
                        <th>Submit Time</th>
                    </tr>
                </thead>

                <tbody id="history"></tbody>

            </table>

        </div>

        <!-- RIGHT -->
        <div class="card">

            <h3>Submission Summary</h3>

            <div class="summary-list">

                <div>
                    <span>Submitted At</span>
                    <strong id="submitTime">--</strong>
                </div>

                <div>
                    <span>Tab Switches</span>
                    <strong id="tabSwitches">0</strong>
                </div>

                <div>
                    <span>Suspicious</span>
                    <strong id="suspiciousScore">Low</strong>
                </div>

            </div>

        </div>

    </div>

    <!-- ACTIONS -->
    <div class="result-actions">

        <button class="btn-secondary" onclick="goMenu()">
            Back To Menu
        </button>

        <button class="btn-primary" onclick="reviewExam()">
            Review Answers
        </button>

    </div>

</div>

</body>
</html>
