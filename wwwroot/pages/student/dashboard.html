<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>

<link rel="stylesheet" href="../../assets/css/core/variables.css">
<link rel="stylesheet" href="../../assets/css/core/base.css">
<link rel="stylesheet" href="../../assets/css/core/animation.css">
<link rel="stylesheet" href="../../assets/css/layout/sidebar.css">
<link rel="stylesheet" href="../../assets/css/layout/layout.css">
<link rel="stylesheet" href="../../assets/css/components/button.css">
<link rel="stylesheet" href="../../assets/css/components/card.css">
<link rel="stylesheet" href="../../assets/css/pages/student/dashboard.css">

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/core/guard.js"></script>

<script src="../../assets/js/layout/sidebar.js"></script>
<script src="../../assets/js/layout/layout.js"></script>

<script>
Guard.requireLogin();
Guard.requireStudent();
</script>

<script defer src="../../assets/js/modules/student/dashboard.js"></script>

</head>

<body>

<div id="layout"></div>

<main class="content">

<div class="container">

    <!-- HERO (clean) -->
    <section class="welcome-banner">

        <div>
            <h1>Welcome Back</h1>
            <p>Track your classes, assignments and progress</p>
        </div>

    </section>

    <!-- STATS -->
    <section class="stats-grid">

        <div class="stat-card">
            <span>My Classes</span>
            <h2 id="myClasses">0</h2>
        </div>

        <div class="stat-card">
            <span>Assignments</span>
            <h2 id="myAssignments">0</h2>
        </div>

    </section>

    <!-- NOTIFICATIONS (placeholder only) -->
    <section class="card">

        <div class="card-header">
            <h3>Notifications</h3>
        </div>

        <div id="notificationList">
            <p class="text-muted">No notifications loaded yet</p>
        </div>

    </section>

</div>

</main>

</body>

</html>
