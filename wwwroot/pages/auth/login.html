<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Login</title>

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>

<script defer
src="../../assets/js/modules/auth/login.js">
</script>

<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/pages/auth/auth.css">

</head>

<body class="auth-page">

<div class="auth-background">

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

</div>

<div class="auth-card">

<div class="auth-header">

<h1>English Hub</h1>

<p>
Online Learning & Examination System
</p>

</div>

<div class="auth-form">

<div class="form-group">

<label>Email</label>

<input
id="email"
class="form-input"
placeholder="Enter your email">

</div>

<div class="form-group">

<label>Password</label>

<input
id="password"
type="password"
class="form-input"
placeholder="Enter your password">

</div>

<button
class="btn-primary auth-btn"
onclick="login()">

Login

</button>

<button
class="btn-secondary auth-btn"
onclick="Router.goRegister()">

Create Account

</button>

</div>

</div>

</body>

</html>
