<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Register</title>

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>

<script src="../../assets/js/modules/utils/validator.js"></script>

<script defer
src="../../assets/js/modules/auth/register.js">
</script>

<link rel="stylesheet"
href="../../assets/css/core/variables.css">

<link rel="stylesheet"
href="../../assets/css/core/base.css">

<link rel="stylesheet"
href="../../assets/css/core/animation.css">

<link rel="stylesheet"
href="../../assets/css/components/button.css">

<link rel="stylesheet"
href="../../assets/css/components/form.css">

<link rel="stylesheet"
href="../../assets/css/pages/auth/auth.css">

</head>

<body class="auth-page">

<div class="auth-background">

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

</div>

<div class="auth-card register-card">

<div class="auth-header">

<h1>Create Account</h1>

<p>
Join English Hub Platform
</p>

</div>

<div class="auth-form">

<div class="form-group">

<label>Full Name</label>

<input
id="name"
class="form-input"
placeholder="Enter full name">

</div>

<div class="form-group">

<label>Email</label>

<input
id="email"
class="form-input"
placeholder="Enter email">

</div>

<div class="form-group">

<label>Phone Number</label>

<input
id="phone"
class="form-input"
placeholder="Enter phone number">

</div>

<div class="form-group">

<label>Password</label>

<input
id="password"
type="password"
class="form-input"
placeholder="Enter password">

</div>

<div class="form-group">

<label>Role</label>

<select
id="role"
class="form-select">

<option value="teacher">
Teacher
</option>

<option value="student">
Student
</option>

</select>

</div>

<button
class="btn-primary auth-btn"
onclick="register()">

Register

</button>

<button
class="btn-secondary auth-btn"
onclick="Router.goLogin()">

Back To Login

</button>

</div>

</div>

</body>

</html>
