<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Register</title>

<script src="../../assets/js/core/config.js"></script>
<script src="../../assets/js/core/storage.js"></script>
<script src="../../assets/js/core/api.js"></script>
<script src="../../assets/js/core/router.js"></script>
<script src="../../assets/js/modules/utils/validator.js"></script>

<script defer
src="../../assets/js/modules/auth/register.js">
</script>

<link rel="stylesheet"
href="../../assets/css/auth.css">

</head>

<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<div class="glass-card">

<h2>Create Account</h2>

<input
id="name"
placeholder="Full name">

<input
id="email"
placeholder="Email">

<input
id="phone"
placeholder="Phone">

<input
id="password"
type="password"
placeholder="Password">

<select id="role">

<option value="teacher">
Teacher
</option>

<option value="student">
Student
</option>

</select>

<button onclick="register()">
Register
</button>

<br><br>

<button
onclick="Router.goLogin()"
class="secondary-btn">

Back to login

</button>

</div>

</body>

</html>
